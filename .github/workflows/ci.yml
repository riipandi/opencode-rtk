name: CI

on:
  push:
    branches: [main, master, trunk]
  pull_request:
    branches: [main, master, trunk]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm ci
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: ls -la dist/
